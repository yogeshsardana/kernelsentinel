---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kernelsentinel
  namespace: kube-system
  labels:
    app: kernelsentinel
    component: security
spec:
  selector:
    matchLabels:
      app: kernelsentinel
  template:
    metadata:
      labels:
        app: kernelsentinel
    spec:
      hostNetwork: true
      hostPID: true
      priorityClassName: system-node-critical
      serviceAccountName: kernelsentinel
      containers:
        - name: kernelsentinel
          image: kernelsentinel/kernelsentinel:latest
          securityContext:
            privileged: true
            capabilities:
              add:
                - BPF
                - NET_ADMIN
                - SYS_ADMIN
                - DAC_OVERRIDE
          volumeMounts:
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: tpm2
              mountPath: /dev/tpmrm0
            - name: config
              mountPath: /etc/kernelsentinel
            - name: host-systemd
              mountPath: /run/systemd
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: tpm2
          hostPath:
            path: /dev/tpmrm0
            type: CharDevice
        - name: config
          configMap:
            name: kernelsentinel-config
        - name: host-systemd
          hostPath:
            path: /run/systemd
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
