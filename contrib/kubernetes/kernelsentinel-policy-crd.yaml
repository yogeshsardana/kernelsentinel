---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kernelsentinelpolicies.security.kernelsentinel.io
spec:
  group: security.kernelsentinel.io
  names:
    kind: KernelSentinelPolicy
    listKind: KernelSentinelPolicyList
    plural: kernelsentinelpolicies
    singular: kernelsentinelpolicy
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                scope:
                  type: string
                  enum: [system, process, container, user]
                selector:
                  type: object
                  properties:
                    namespaces:
                      type: array
                      items:
                        type: string
                    podLabels:
                      type: object
                      additionalProperties:
                        type: string
                    processPaths:
                      type: array
                      items:
                        type: string
                attestation:
                  type: object
                  properties:
                    pcrIndex:
                      type: integer
                      minimum: 0
                      maximum: 23
                    quorumRequired:
                      type: integer
                      minimum: 1
                    quorumTotal:
                      type: integer
                      minimum: 1
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      event:
                        type: string
                        enum: [file_open, task_alloc, socket_connect, socket_bind,
                               execve, mmap, mprotect]
                      action:
                        type: string
                        enum: [allow, deny, log]
                      processPath:
                        type: string
                      uid:
                        type: string
                      gid:
                        type: string
                      flagsMask:
                        type: string
                      flagsValue:
                        type: string
---
apiVersion: security.kernelsentinel.io/v1alpha1
kind: KernelSentinelPolicy
metadata:
  name: container-integrity-policy
  namespace: default
spec:
  scope: container
  selector:
    podLabels:
      app: sensitive-workload
  attestation:
    pcrIndex: 16
    quorumRequired: 2
    quorumTotal: 3
  rules:
    - event: socket_connect
      action: deny
    - event: execve
      action: allow
      processPath: "/usr/local/bin/*"
    - event: mmap
      action: deny
      flagsMask: "0x1"
---
apiVersion: security.kernelsentinel.io/v1alpha1
kind: KernelSentinelPolicy
metadata:
  name: system-integrity-policy
  namespace: kube-system
spec:
  scope: system
  attestation:
    pcrIndex: 15
    quorumRequired: 2
    quorumTotal: 3
  rules:
    - event: socket_connect
      action: allow
      processPath: "/usr/bin/curl"
    - event: execve
      action: allow
      processPath: "/usr/bin/*"
    - event: execve
      action: deny
      processPath: "/tmp/*"
