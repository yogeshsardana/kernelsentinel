name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libbpf-dev libyaml-dev \
            libtss2-esys-dev libtss2-rc-dev libtss2-mu-dev \
            bpftool linux-tools-common linux-tools-generic \
            python3-pip

      - name: Build
        run: make

      - name: Check binaries
        run: |
          ls -la build/
          file build/ksd build/ksctl build/ks-adversary build/ks-benchmark

      - name: Run unit tests
        run: make test

      - name: Run benchmark
        run: ./build/ks-benchmark

      - name: Check eBPF programs
        run: |
          for f in build/*.bpf.o; do
            echo "Checking $f..."
            bpftool prog dump xlated "$f" > /dev/null 2>&1 || true
          done

      - name: Run adversary harness
        run: ./build/ks-adversary all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernelsentinel-build
          path: build/

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y clang llvm
      - name: Check eBPF code compiles
        run: |
          for f in src/bpf/*.bpf.c; do
            echo "Compiling $f..."
            clang -O2 -target bpf -g -I src/bpf -I include -c "$f" -o /dev/null
          done
      - name: Check C code compiles
        run: |
          for f in src/daemon/*.c src/libks/*.c src/tools/*.c; do
            echo "Checking $f..."
            gcc -O2 -Wall -Wextra -I include -I src/daemon -fsyntax-only "$f" 2>&1 || true
          done
